name: research-desk

x-runtime: &runtime
  build:
    context: .
  image: research-desk:local
  restart: unless-stopped
  read_only: true
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  tmpfs:
    - /tmp:size=128m,mode=1777
  volumes:
    - research-data:/app/data
  environment:
    RESEARCH_MODE: ${RESEARCH_MODE:-demo}
    RESEARCH_DATA_DIR: /app/data
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    TAVILY_API_KEY: ${TAVILY_API_KEY:-}

services:
  workbench:
    <<: *runtime
    ports:
      - "127.0.0.1:${RESEARCH_DESK_UI_PORT:-8501}:8501"

  api:
    <<: *runtime
    profiles: ["api"]
    command: ["uvicorn", "research_system.api.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:${RESEARCH_DESK_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  research-data:
